name: Build for macOS

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

# https://stackoverflow.com/a/72408109/6942800
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least-privilege: only needs to read code for building.
permissions:
  contents: read

jobs:
  build:
    name: Build Boring Notch (${{ matrix.xcode }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            xcode: "~26.0"
          - os: macos-26
            xcode: "^26"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build
        uses: mxcl/xcodebuild@d3ee9b419c1be9a988086c58fe0988f32d99cfc5 # v3.6.0
        with:
          xcode: ${{ matrix.xcode }}
          platform: macOS
          scheme: boringNotch
          action: build
          verbosity: xcpretty
          upload-logs: always
          configuration: release

