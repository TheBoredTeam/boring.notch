name: "Release on Tag"

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-latest
    env:
      PROJECT_NAME: boringNotch
      XCODE_VERSION: "16.4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project ${{ env.PROJECT_NAME }}.xcodeproj

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app || true
          xcodebuild -version || echo "Xcode version set"

      - name: Set version
        run: |
          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ steps.version.outputs.version }}/g" ${{ env.PROJECT_NAME }}.xcodeproj/project.pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $GITHUB_RUN_NUMBER/g" ${{ env.PROJECT_NAME }}.xcodeproj/project.pbxproj

      - name: Build
        run: |
          xcodebuild clean archive \
            -project ${{ env.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ env.PROJECT_NAME }} \
            -archivePath ${{ env.PROJECT_NAME }} \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export
        run: |
          mkdir -p Release
          xcodebuild -exportArchive \
            -archivePath ${{ env.PROJECT_NAME }}.xcarchive \
            -exportPath Release \
            -exportOptionsPlist - <<'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>method</key>
  <string>mac-application</string>
</dict>
</plist>
EOF

      - name: Create DMG
        run: |
          hdiutil create -volname "${{ env.PROJECT_NAME }}" -srcfolder Release/${{ env.PROJECT_NAME }}.app -ov -format UDZO Release/${{ env.PROJECT_NAME }}.dmg || \
          echo "DMG creation via hdiutil failed, using app bundle"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: Release/${{ env.PROJECT_NAME }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
