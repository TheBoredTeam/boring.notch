name: "Release"

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild archive -project boringNotch.xcodeproj -scheme boringNotch -archivePath build/boringNotch -destination "generic/platform=macOS" CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO

      - name: Export
        run: mkdir -p Release && xcodebuild -exportArchive -archivePath build/boringNotch.xcarchive -exportPath Release -exportOptionsPlist - <<'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict><key>method</key><string>mac-application</string></dict>
</plist>
PLIST

      - name: DMG
        run: hdiutil create -volname boringNotch -srcfolder Release/boringNotch.app -ov -format UDZO Release/boringNotch.dmg

      - uses: softprops/action-gh-release@v2
        with:
          files: Release/boringNotch.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}