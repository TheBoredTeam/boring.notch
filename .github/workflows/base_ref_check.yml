name: Fork PR target policy

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions: {}

jobs:
  comment:
    name: PR target guidance
    if: ${{ github.event.pull_request.head.repo.fork == true }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Create, update, delete, or skip policy comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const pr = context.payload.pull_request;
            const base = pr.base.ref;
            const issue_number = pr.number;
            const pull_number = pr.number;
            const action = context.payload.action;
            const changes = context.payload.changes || {};

            // For edited events, only do comment work if the base branch changed.
            if (action === 'edited' && !changes.base) {
              core.info('Edited event did not change base branch; skipping comment update.');
              return;
            }

            const marker = '<!-- fork-pr-target-policy -->';

            const allowedPatterns = [
              /^README\.md$/,
              /^CONTRIBUTING\.md$/,
              /^SECURITY\.md$/,
              /^LICENSE$/,
              /^THIRD_PARTY_LICENSES$/,
              /^\.gitignore$/,
              /^crowdin\.yml$/,
              /^\.github\/.+$/
            ];

            const isAllowedPath = (path) =>
              allowedPatterns.some((pattern) => pattern.test(path));

            const toSafeLiteral = (value) =>
              JSON.stringify(String(value))
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, (c) =>
                  `\\u${c.codePointAt(0).toString(16).padStart(4, '0')}`
                )
                .replace(/</g, '\\u003c')
                .replace(/>/g, '\\u003e')
                .replace(/&/g, '\\u0026')
                .replace(/@/g, '\\u0040')
                .replace(/#/g, '\\u0023')
                .replace(/`/g, '\\u0060');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(marker)
            );

            let body = null;

            if (base === 'main') {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number,
                per_page: 100
              });

              const disallowed = files.filter((file) => {
                const pathsToCheck = [file.filename, file.previous_filename].filter(Boolean);
                return pathsToCheck.some((path) => !isAllowedPath(path));
              });

              // Only comment on main when the PR is NOT allowlist-compliant.
              if (disallowed.length > 0) {
                body = [
                  marker,
                  '⚠️ This PR targets `main`.',
                  '',
                  'PRs should normally target `dev`.',
                  'A PR to `main` is only acceptable when no application code files are changed',
                  'This PR includes one or more changes outside of the allowlist, please update your target branch.'
                ].join('\n');
              }
            } else if (base === 'dev') {
              // Do not create a new comment for dev PRs.
              // Only update an existing policy comment if one already exists,
              // which covers PRs that were retargeted back to dev.
              if (existing) {
                body = [
                  marker,
                  '✅ This PR now targets `dev`.',
                  '',
                  'This is the expected target branch for fork PRs, so this check passes.'
                ].join('\n');
              }
            } else {
              body = [
                marker,
                `❌ This PR targets ${toSafeLiteral(base)}.`,
                '',
                'Fork PRs may only target `dev` or `main`.',
                'Targets other than those branches are not allowed, so this check fails.'
              ].join('\n');
            }

            if (body && existing) {
              if (existing.body !== body) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
              } else {
                core.info('Existing policy comment already matches desired body.');
              }
            } else if (body && !existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            } else if (!body && existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id
              });
              core.info('Deleted stale policy comment because no comment is needed now.');
            } else {
              core.info(`No comment action needed for base branch ${toSafeLiteral(base)}.`);
            }

  validate:
    name: Fork PR target check
    if: ${{ github.event.pull_request.head.repo.fork == true }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Enforce target policy
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const base = context.payload.pull_request.base.ref;
            const pull_number = context.payload.pull_request.number;

            const allowedPatterns = [
              /^README\.md$/,
              /^CONTRIBUTING\.md$/,
              /^SECURITY\.md$/,
              /^LICENSE$/,
              /^THIRD_PARTY_LICENSES$/,
              /^\.gitignore$/,
              /^crowdin\.yml$/,
              /^\.github\/.+$/
            ];

            const isAllowedPath = (path) =>
              allowedPatterns.some((pattern) => pattern.test(path));

            const toSafeLiteral = (value) =>
              JSON.stringify(String(value))
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, (c) =>
                  `\\u${c.codePointAt(0).toString(16).padStart(4, '0')}`
                )
                .replace(/</g, '\\u003c')
                .replace(/>/g, '\\u003e')
                .replace(/&/g, '\\u0026')
                .replace(/@/g, '\\u0040')
                .replace(/#/g, '\\u0023')
                .replace(/`/g, '\\u0060');

            const describeFile = (file) => {
              if (file.previous_filename) {
                return `- ${toSafeLiteral(file.previous_filename)} -> ${toSafeLiteral(file.filename)}`;
              }
              return `- ${toSafeLiteral(file.filename)}`;
            };

            if (base === 'dev') {
              core.info('PR targets dev: allowed.');
              return;
            }

            if (base !== 'main') {
              core.setFailed(
                `PR targets ${toSafeLiteral(base)}: not allowed. Only "dev" and "main" are permitted.`
              );
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
              per_page: 100
            });

            // Treat renames conservatively: both old and new paths must be allowed.
            const disallowed = files.filter((file) => {
              const pathsToCheck = [file.filename, file.previous_filename].filter(Boolean);
              return pathsToCheck.some((path) => !isAllowedPath(path));
            });

            if (disallowed.length > 0) {
              core.setFailed([
                "PR targets 'main' but includes changes outside the allowed paths.",
                "Only allowlisted repository metadata changes may target 'main'.",
                '',
                'Allowed paths:',
                '- "README.md"',
                '- "CONTRIBUTING.md"',
                '- "SECURITY.md"',
                '- "LICENSE"',
                '- "THIRD_PARTY_LICENSES"',
                '- ".gitignore"',
                '- "crowdin.yml"',
                '- ".github/**"',
                '',
                'Disallowed changed paths:',
                ...disallowed.map(describeFile)
              ].join('\n'));
              return;
            }

            core.info("PR targets main and only changes allowed paths: allowed.");
